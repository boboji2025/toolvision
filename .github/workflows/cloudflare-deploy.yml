name: Deploy to Cloudflare

on:
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  deployments: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    name: Deploy to Cloudflare Pages

    steps:
      - name: Checkout source code
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22' # 👈 这里已从 '20' 改为 '22'
          cache: 'pnpm'

      - name: Force remove broken lockfile
        run: rm -f pnpm-lock.yaml

      - name: Install dependencies from scratch
        run: pnpm install --no-frozen-lockfile

      - name: Build Next.js Fullstack Application
        run: pnpm build
        env:
          BUILD_TARGET: cloudflare
          NODE_ENV: production
          NEXT_PUBLIC_TMDB_API_KEY: ${{ secrets.NEXT_PUBLIC_TMDB_API_KEY }}

     - name: Publish to Cloudflare Pages
        #  👇 将原来的 .open-next/assets 改为 .open-next
        run: pnpm wrangler pages deploy .open-next --project-name=toolvision
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
