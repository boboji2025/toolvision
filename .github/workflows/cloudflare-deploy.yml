name: Deploy to Cloudflare

on:
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  deployments: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    name: Deploy to Cloudflare Pages

    steps:
      - name: Checkout source code
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'pnpm'

      - name: Force remove broken lockfile
        run: rm -f pnpm-lock.yaml

      - name: Install dependencies from scratch
        run: pnpm install --no-frozen-lockfile

      - name: Build Next.js Fullstack Application
        # 💡 核心修改：如果检测到内置命令，强行追加跳过版本检查的官方参数
        run: |
          if pnpm run | grep -q "build:cloudflare"; then
            BUILD_TARGET=cloudflare pnpm gen:manifest && npx @opennextjs/cloudflare build --dangerouslyUseUnsupportedNextVersion
          else
            pnpm build
          fi
        env:
          BUILD_TARGET: cloudflare
          NODE_ENV: production
          NEXT_PUBLIC_TMDB_API_KEY: ${{ secrets.NEXT_PUBLIC_TMDB_API_KEY }}

      - name: Publish to Cloudflare Pages
        # 💡 核心修改：移除复杂的本地路径依赖。全栈项目在使用专属命令构建后，
        # 直接使用 wrangler pages deploy 加上 --build-output-dir 参数，或者交由 wrangler 自动寻找托管
        run: pnpm wrangler pages deploy --project-name=toolvision
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
